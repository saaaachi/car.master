<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; font-family: sans-serif; }
        #timer { font-size: 20px; font-weight: bold; color: #ff4444; margin-bottom: 20px; }
        #closeBtn { 
            display: none; /* 最初は隠す */
            padding: 15px 30px; background: #333; color: #fff; border: none; border-radius: 8px; 
            font-size: 18px; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div id="timer">緊急車両が通過中... <span id="sec">5</span>秒</div>
    <button id="closeBtn" onclick="window.parent.postMessage('adFinished', '*')">× 閉じて10G獲得</button>

    <div id="adArea" style="margin-top: 20px;">
        </div>

    <script>
        let count = 5;
        const btn = document.getElementById('closeBtn');
        const secDisp = document.getElementById('sec');
        const timerText = document.getElementById('timer');

        const interval = setInterval(() => {
            count--;
            secDisp.innerText = count;
            if (count <= 0) {
                clearInterval(interval);
                timerText.style.display = 'none'; // タイマーを消す
                btn.style.display = 'block';     // ボタンを出す
            }
        }, 1000);
    </script>
</body>
</html>
