<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: radial-gradient(circle, #222, #000); font-family: sans-serif; color: #fff; overflow: hidden;
        }
        .siren {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(255,0,0,0.15), rgba(0,0,255,0.15));
            animation: flash 0.4s infinite alternate; z-index: -1;
        }
        @keyframes flash { from { opacity: 0.2; } to { opacity: 0.7; } }
        #timerContent { text-align: center; }
        .bar-bg { width: 220px; height: 10px; background: #333; border-radius: 5px; margin: 20px auto; overflow: hidden; border: 1px solid #444; }
        .bar-fill { width: 0%; height: 100%; background: #ff3333; transition: width 1s linear; }
        h2 { font-size: 28px; margin: 0; color: #ffcc00; text-shadow: 0 0 15px rgba(255,204,0,0.5); }
        p { font-size: 14px; color: #aaa; margin-top: 10px; }
        #closeBtn { 
            display: none; padding: 18px 45px; background: #ffcc00; color: #000; 
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 25px rgba(255, 204, 0, 0.4);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="siren"></div>
    <div id="timerContent">
        <h2>EMERGENCY!</h2>
        <p>緊急車両が通過するのを待っています</p>
        <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
        <div style="font-size: 20px;"><span id="sec">5</span>s</div>
    </div>

    <button id="closeBtn" onclick="window.parent.postMessage('adFinished', '*')">10G を受け取って再開</button>

    <div style="margin-top: 35px; background: #fff; padding: 4px; border-radius: 4px;">
        <div id="im-1b37e3d6b44c4309936ced973c4edc1a">
            <script async src="https://imp-adedge.i-mobile.co.jp/script/v1/spot.js?20220104"></script>
            <script>(window.adsbyimobile=window.adsbyimobile||[]).push({pid:84561,mid:590804,asid:1925759,type:"banner",display:"inline",elementid:"im-1b37e3d6b44c4309936ced973c4edc1a"})</script>
        </div>
    </div>

    <script>
        let time = 5;
        const btn = document.getElementById('closeBtn');
        const bar = document.getElementById('bar');
        const interval = setInterval(() => {
            time--;
            document.getElementById('sec').innerText = time;
            bar.style.width = ((5 - time) / 5 * 100) + "%";
            if (time <= 0) {
                clearInterval(interval);
                document.getElementById('timerContent').style.display = 'none';
                btn.style.display = 'block';
            }
        }, 1000);
    </script>
</body>
</html>
