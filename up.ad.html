    <script>
        let currentAd = 1;
        const totalAds = 4;

        setInterval(() => {
            // 現在の広告を非表示にする
            document.getElementById(`ad${currentAd}`).classList.remove('active');
            
            // 次の番号へ（4の次は1に戻る）
            currentAd = (currentAd % totalAds) + 1;
            
            // 新しい広告を表示する
            document.getElementById(`ad${currentAd}`).classList.add('active');
        }, 30000); // 30秒 (30000ms) ごとに実行
    </script>
