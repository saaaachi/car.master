<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Road Master - Intersection</title>
    <style>
        canvas { border: 4px solid #333; background: #55a846; display: block; margin: 20px auto; touch-action: none; }
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        .ui { font-size: 24px; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ui">Road Master 🚧 | コイン: <span id="coinCount">0</span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p>クリックで「横方向」と「縦方向」の信号を切り替えます！</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let coins = 0;
        let isVerticalGreen = false; // 縦が青か、横が青か

        // --- 1. 画像の設定（アップロードした名前に合わせています） ---
        const images = {};
        const assets = {
            car_up: 'images/car.up.red.PNG',
            car_down: 'images/car.down.red.PNG',
            car_left: 'images/car.left.red.PNG',
            car_right: 'images/car.right.red.PNG'
        };

        for (let key in assets) {
            images[key] = new Image();
            images[key].src = assets[key];
        }

        // --- 2. 車のデータ作成 ---
        let cars = [
            { x: -50, y: 285, speed: 2, dir: 'right', img: 'car_right' }, // 左から右
            { x: 650, y: 245, speed: 2, dir: 'left', img: 'car_left' },   // 右から左
            { x: 315, y: -50, speed: 2, dir: 'down', img: 'car_down' },  // 上から下
            { x: 265, y: 650, speed: 2, dir: 'up', img: 'car_up' }       // 下から上
        ];

        canvas.addEventListener('mousedown', () => { isVerticalGreen = !isVerticalGreen; });

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 道路を描く（十字路）
            ctx.fillStyle = '#444';
            ctx.fillRect(0, 240, 600, 80); // 横の道
            ctx.fillRect(260, 0, 80, 600); // 縦の道

            // 信号機の描画（簡易版）
            ctx.fillStyle = isVerticalGreen ? 'red' : 'green';
            ctx.fillRect(200, 240, 10, 10); // 横用信号
            ctx.fillStyle = isVerticalGreen ? 'green' : 'red';
            ctx.fillRect(260, 200, 10, 10); // 縦用信号

            cars.forEach(car => {
                let canMove = true;

                // 簡易的な信号判定
                if (car.dir === 'right' && !isVerticalGreen && car.x > 180 && car.x < 200) canMove = false;
                if (car.dir === 'left' && !isVerticalGreen && car.x < 380 && car.x > 360) canMove = false;
                if (car.dir === 'down' && isVerticalGreen && car.y > 180 && car.y < 200) canMove = false;
                if (car.dir === 'up' && isVerticalGreen && car.y < 380 && car.y > 360) canMove = false;

                if (canMove) {
                    if (car.dir === 'right') car.x += car.speed;
                    if (car.dir === 'left') car.x -= car.speed;
                    if (car.dir === 'down') car.y += car.speed;
                    if (car.dir === 'up') car.y -= car.speed;
                }

                // 画面端でリセット
                if (car.x > 650 || car.x < -100 || car.y > 650 || car.y < -100) {
                    if (car.dir === 'right') car.x = -50;
                    if (car.dir === 'left') car.x = 650;
                    if (car.dir === 'down') car.y = -50;
                    if (car.dir === 'up') car.y = 650;
                }

                // 自作ドット絵の描画！
                if (images[car.img].complete) {
                    ctx.drawImage(images[car.img], car.x, car.y, 32, 32);
                }
            });

            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
