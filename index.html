<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - City Tycoon</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #eee; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #adSpace { height: 50px; background: #ddd; border-bottom: 2px solid #ccc; }
        #gameContainer { position: relative; flex-grow: 1; overflow: hidden; }
        canvas { display: block; background: #7ab36a; width: 100%; height: 100%; }
        
        .status-bar { 
            position: absolute; top: 10px; left: 10px; right: 10px; 
            display: flex; justify-content: space-between; 
            background: rgba(0,0,0,0.8); color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 13px; z-index: 10;
        }
        .status-bar span { color: #ffcc00; font-weight: bold; }

        #configPanel { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; border: 3px solid #333; padding: 20px; border-radius: 15px; z-index: 2000; width: 240px;
        }
        .panel-close { position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 20px; }
        #adFrame { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #fff; z-index: 1000; }
    </style>
</head>
<body>
    <div id="adSpace"><iframe src="up.ad.html" style="width:100%; height:50px; border:none;" scrolling="no"></iframe></div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="status-bar">
            <div>💰 <span id="goldText">0</span></div>
            <div>👥 <span id="popText">0</span></div>
            <div>😊 <span id="happyText">100</span></div>
        </div>

        <div id="configPanel">
            <div class="panel-close" onclick="closeConfig()">×</div>
            <h3 id="panelTitle" style="margin:0 0 10px 0; font-size:16px;">建設</h3>
            <p id="panelDesc" style="font-size:12px; color:#666;"></p>
            <button id="actionBtn" style="width:100%; padding:12px; background:#ffcc00; border:none; border-radius:5px; font-weight:bold; cursor:pointer;"></button>
            <hr>
            <div style="font-size:11px;">青信号の時間: <span id="secVal">5</span>秒</div>
            <input type="range" id="secRange" min="3" max="15" value="5" style="width:100%" oninput="updateSec(this.value)">
        </div>
        <iframe id="adFrame" src="ad.html"></iframe>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gold = 50, signalLevel = 1, signalState = 0, isPaused = false;
        let happiness = 100, population = 0, lastChangeTime = Date.now(), autoChangeTime = 5;

        const images = {};
        const assets = { singo: 'images/singo.png', cars: 'images/car.png', house: 'images/house.png', tatemono: 'images/tatemono.png' };
        for (let key in assets) { images[key] = new Image(); images[key].src = assets[key]; }

        // 四隅の建物スロット
        let slots = [];
        function initSlots() {
            const mx = canvas.width/2, my = canvas.height/2;
            slots = [
                { x: mx-160, y: my-160, type: 'house', lv: 0, subType: 0 }, // 左上
                { x: mx+70,  y: my-160, type: 'shop',  lv: 0, subType: 1 }, // 右上
                { x: mx-160, y: my+70,  type: 'shop',  lv: 0, subType: 0 }, // 左下
                { x: mx+70,  y: my+70,  type: 'house', lv: 0, subType: 1 }  // 右下
            ];
        }

        function resizeCanvas() { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight - 50;
            initSlots();
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let cars = [];
        let selectedSlot = null;

        function updateUI() {
            document.getElementById('goldText').innerText = gold;
            document.getElementById('popText').innerText = population;
            document.getElementById('happyText').innerText = Math.floor(happiness);
            calculateCityStats();
        }

        function calculateCityStats() {
            let p = 0, hBase = 100;
            slots.forEach(s => {
                if(s.lv > 0) {
                    if(s.type === 'house') p += s.lv * 20;
                    else hBase += s.lv * 10;
                }
            });
            population = p;
            // 幸福度はベースに信号待ちの微調整が乗る（徐々にベースに近づく処理）
            if(happiness < hBase) happiness += 0.01;
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width/rect.width);
            const my = (e.clientY - rect.top) * (canvas.height/rect.height);
            
            // スロットクリック判定
            selectedSlot = slots.find(s => mx > s.x && mx < s.x+90 && my > s.y && my < s.y+90);
            if(selectedSlot) {
                showConfig(selectedSlot);
                return;
            }
            // 信号クリック
            if (Math.abs(mx - canvas.width/2) < 50 && Math.abs(my - canvas.height/2) < 50) {
                showConfig(null);
            }
        });

        function showConfig(slot) {
            isPaused = true;
            const panel = document.getElementById('configPanel');
            const btn = document.getElementById('actionBtn');
            panel.style.display = 'block';
            
            if(slot) {
                const cost = (slot.lv + 1) * 50;
                document.getElementById('panelTitle').innerText = slot.type === 'house' ? "住宅地" : "商業施設";
                document.getElementById('panelDesc').innerText = `Lv.${slot.lv} → Lv.${slot.lv+1}\n必要費用: ${cost}G`;
                btn.innerText = slot.lv === 0 ? "建設する" : "アップグレード";
                btn.onclick = () => {
                    if(gold >= cost && slot.lv < 3) {
                        gold -= cost; slot.lv++; closeConfig(); updateUI();
                    }
                };
                btn.disabled = gold < cost || slot.lv >= 3;
            } else {
                document.getElementById('panelTitle').innerText = "信号機設定";
                btn.innerText = "信号機を強化 (100G)";
                btn.onclick = () => { if(gold>=100){gold-=100; signalLevel++; closeConfig(); updateUI();}};
            }
        }

        function closeConfig() { document.getElementById('configPanel').style.display = 'none'; isPaused = false; }
        function updateSec(v) { autoChangeTime = v; document.getElementById('secVal').innerText = v; }

        function spawnCar() {
            if (isPaused) return;
            // 人口が多いほど車が増える
            const interval = Math.max(500, 3000 - (population * 10));
            const dirs = ['right', 'down', 'left', 'up'];
            const dir = dirs[Math.floor(Math.random()*4)];
            const mx = canvas.width/2, my = canvas.height/2;
            let x, y;
            if(dir==='right'){ x=-100; y=my+5; } else if(dir==='down'){ x=mx+5; y=-100; }
            else if(dir==='left'){ x=canvas.width+100; y=my-50; } else { x=mx-50; y=canvas.height+100; }
            const car = { x, y, speed: 2, dir, type: 'normal', carIdx: Math.floor(Math.random()*5), waitTime: 0, passed: false, width: 40, height: 40 };
            if (!cars.some(o => Math.abs(o.x - car.x) < 80 && Math.abs(o.y - car.y) < 80)) cars.push(car);
            setTimeout(spawnCar, interval);
        }
        setTimeout(spawnCar, 2000);

        function drawBuilding(s) {
            if(s.lv === 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(s.x, s.y, 90, 90);
                return;
            }
            // 画像切り出しロジック
            const img = s.type === 'house' ? images.house : images.tatemono;
            if(!img.complete) return;
            
            // 1つの建物の基本サイズ (320x320くらいの大枠を想定して縮小表示)
            const sw = img.width / 3, sh = img.height / 3;
            const sx = s.subType * sw;
            const sy = (s.lv - 1) * sh;
            ctx.drawImage(img, sx, sy, sw, sh, s.x, s.y, 90, 90);
        }

        function update() {
            if (!isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const mx = canvas.width/2, my = canvas.height/2;

                if (Date.now() - lastChangeTime > autoChangeTime * 1000) {
                    signalState = (signalState + 1) % 4;
                    lastChangeTime = Date.now();
                }

                // 道路
                ctx.fillStyle = '#444'; ctx.fillRect(0, my-50, canvas.width, 100); ctx.fillRect(mx-50, 0, 100, canvas.height);
                
                // 建物描画
                slots.forEach(drawBuilding);

                let hRed = signalState >= 2, vRed = signalState <= 1;

                cars.forEach((car, i) => {
                    let canMove = true;
                    const atLight = (car.dir==='right' && hRed && car.x>mx-105 && car.x<mx-85) ||
                                   (car.dir==='down' && vRed && car.y>my-105 && car.y<my-85) ||
                                   (car.dir==='left' && hRed && car.x<mx+60 && car.x>mx+40) ||
                                   (car.dir==='up' && vRed && car.y<my+60 && car.y>my+40);
                    
                    if (atLight) { canMove = false; car.waitTime++; }
                    
                    if (canMove) {
                        if (car.waitTime > 0 && !car.passed) {
                            if (car.waitTime < 100) happiness += 0.2;
                            else if (car.waitTime > 400) happiness -= 0.5;
                        }
                        if (car.dir==='right') car.x+=car.speed; else if (car.dir==='down') car.y+=car.speed;
                        else if (car.dir==='left') car.x-=car.speed; else car.y-=car.speed;
                    }

                    ctx.save();
                    ctx.translate(car.x+20, car.y+20);
                    if (car.dir==='right') ctx.rotate(Math.PI/2); else if (car.dir==='down') ctx.rotate(Math.PI); else if (car.dir==='left') ctx.rotate(-Math.PI/2);
                    if (images.cars.complete) ctx.drawImage(images.cars, car.carIdx*48, 0, 48, 48, -20, -20, 40, 40);
                    ctx.restore();

                    if (!car.passed && (Math.abs(car.x-mx)<10 || Math.abs(car.y-my)<10)) {
                        gold += signalLevel; car.passed = true; updateUI();
                    }
                });
                cars = cars.filter(c => c.x>-200 && c.x<canvas.width+200 && c.y>-200 && c.y<canvas.height+200);
            }
            requestAnimationFrame(update);
        }
        updateUI(); update();
    </script>
</body>
</html>
