<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - Flow Fix</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #7ab36a; font-family: sans-serif; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* 広告スペース */
        #adArea { width: 100%; height: 50px; background: #eee; z-index: 1000; }
        
        canvas { display: block; flex-grow: 1; }

        /* ステータスバー（IMG_6003のスタイルを再現） */
        .status-bar { 
            position: absolute; top: 60px; left: 10px; right: 10px; 
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(0,0,0,0.85); color: #fff; padding: 8px; border-radius: 20px; font-size: 14px; z-index: 100;
        }

        .panel { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; border: 4px solid #333; padding: 20px; border-radius: 20px; z-index: 2000; width: 250px; text-align: center;
        }
        .btn { width: 100%; padding: 15px; background: #ffcc00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="adArea">
        <iframe src="up.ad.html" width="100%" height="50" frameborder="0" scrolling="no"></iframe>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="status-bar">
            <div>💰 <span id="goldText">50</span></div>
            <div>🚥 Lv.<span id="sigLvText">1</span></div>
            <div>💎 +<span id="incomeText">1</span>G</div>
        </div>

        <div id="signalPanel" class="panel">
            <h3 style="margin-top:0">🚥 信号強化</h3>
            <p id="nextUpgradeText">次へ: 30G</p>
            <button id="upgradeBtn" class="btn" onclick="upgradeSignal()">アップグレード</button>
            <button class="btn" style="background:#eee" onclick="closeAll()">閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gold = 50, signalLevel = 1, signalState = 0, isPaused = false;
        let lastChangeTime = Date.now(), autoChangeTime = 5;

        const images = {};
        const assets = { cars: 'images/car.png', singo: 'singo.png' };
        for (let key in assets) { images[key] = new Image(); images[key].src = assets[key]; }

        const upgradeInfo = [
            { cost: 0, income: 1, next: 30 },
            { cost: 30, income: 2, next: 50 },
            { cost: 50, income: 3, next: 100 },
            { cost: 100, income: 4, next: null }
        ];

        let cars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize); resize();

        function spawnCar() {
            if (isPaused || cars.length > 25) return; // 溜まりすぎ防止
            const dirs = ['right', 'down', 'left', 'up'];
            const dir = dirs[Math.floor(Math.random()*4)];
            const mx = canvas.width/2, my = canvas.height/2;
            let x, y;
            if(dir==='right'){ x=-50; y=my+10; } else if(dir==='down'){ x=mx+10; y=-50; }
            else if(dir==='left'){ x=canvas.width+50; y=my-40; } else { x=mx-40; y=canvas.height+50; }
            
            cars.push({ x, y, speed: 2.8, dir, passed: false, id: Math.random() });
        }
        setInterval(spawnCar, 1200);

        function update() {
            if (!isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const mx = canvas.width/2, my = canvas.height/2;

                if (Date.now() - lastChangeTime > autoChangeTime * 1000) {
                    signalState = (signalState + 1) % 4;
                    lastChangeTime = Date.now();
                }

                // 道路
                ctx.fillStyle = '#444';
                ctx.fillRect(0, my-50, canvas.width, 100);
                ctx.fillRect(mx-50, 0, 100, canvas.height);

                // 信号機の描画（縦用と横用の2箇所）
                if(images.singo.complete) {
                    const sw = images.singo.width / 4;
                    const sh = images.singo.height / 2;
                    const col = signalLevel - 1;
                    
                    // 横用信号（左側に配置、縦方向の交通を制御）
                    ctx.drawImage(images.singo, col*sw, (signalState >= 2 ? 0 : sh), sw, sh, mx-75, my-25, 40, 40);
                    // 縦用信号（上側に配置、横方向の交通を制御）
                    ctx.drawImage(images.singo, col*sw, (signalState < 2 ? 0 : sh), sw, sh, mx-25, my-75, 40, 40);
                }

                // 信号の状態（0,1: 縦が青, 2,3: 横が青）
                const vGo = signalState < 2;
                const hGo = signalState >= 2;

                cars.forEach(car => {
                    let canMove = true;

                    // 車間距離の維持（渋滞解消のため判定を最小限に）
                    const front = cars.find(o => o.id !== car.id && Math.abs(o.x - car.x) < 45 && Math.abs(o.y - car.y) < 45);
                    if(front) {
                        if(car.dir==='right' && front.x > car.x) canMove = false;
                        if(car.dir==='down' && front.y > car.y) canMove = false;
                        if(car.dir==='left' && front.x < car.x) canMove = false;
                        if(car.dir==='up' && front.y < car.y) canMove = false;
                    }

                    // 信号判定
                    const stopLine = 85;
                    if(car.dir==='right' && !hGo && car.x > mx-stopLine && car.x < mx-60) canMove = false;
                    if(car.dir==='down' && !vGo && car.y > my-stopLine && car.y < my-60) canMove = false;
                    if(car.dir==='left' && !hGo && car.x < mx+stopLine && car.x > mx+40) canMove = false;
                    if(car.dir==='up' && !vGo && car.y < my+stopLine && car.y > my+40) canMove = false;

                    if(canMove) {
                        if(car.dir==='right') car.x+=car.speed; else if(car.dir==='down') car.y+=car.speed;
                        else if(car.dir==='left') car.x-=car.speed; else car.y-=car.speed;
                    }

                    // 車の描画（スプライトシート一番左上のみ使用）
                    ctx.save();
                    ctx.translate(car.x+20, car.y+20);
                    if(car.dir==='right') ctx.rotate(Math.PI/2); else if(car.dir==='down') ctx.rotate(Math.PI); else if(car.dir==='left') ctx.rotate(-Math.PI/2);
                    if(images.cars.complete) {
                        ctx.drawImage(images.cars, 0, 0, images.cars.width/5, images.cars.height/2, -20, -20, 40, 40);
                    }
                    ctx.restore();

                    // 収益判定
                    if (!car.passed && Math.abs(car.x - mx) < 35 && Math.abs(car.y - my) < 35) {
                        gold += upgradeInfo[signalLevel-1].income;
                        car.passed = true;
                        updateUI();
                    }
                });
                cars = cars.filter(c => c.x > -100 && c.x < canvas.width+100 && c.y > -100 && c.y < canvas.height+100);
            }
            requestAnimationFrame(update);
        }

        function updateUI() {
            document.getElementById('goldText').innerText = gold;
            document.getElementById('sigLvText').innerText = signalLevel;
            const info = upgradeInfo[signalLevel - 1];
            document.getElementById('incomeText').innerText = info.income;
            const btn = document.getElementById('upgradeBtn');
            if (info.next) {
                document.getElementById('nextUpgradeText').innerText = `次へ: ${info.next}G`;
                btn.disabled = gold < info.next;
            } else {
                document.getElementById('nextUpgradeText').innerText = "Max Level";
                btn.style.display = 'none';
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const cx = canvas.width/2, cy = canvas.height/2;
            if (Math.abs(mx-cx)<80 && Math.abs(my-cy)<80) { 
                document.getElementById('signalPanel').style.display='block'; 
                isPaused=true;
                updateUI();
            }
        });

        function upgradeSignal() {
            const nextCost = upgradeInfo[signalLevel-1].next;
            if(nextCost && gold >= nextCost) { gold -= nextCost; signalLevel++; updateUI(); closeAll(); }
        }
        function closeAll() { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); isPaused=false; }
        
        update();
    </script>
</body>
</html>
