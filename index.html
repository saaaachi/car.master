<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - Sprite Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #7ab36a; font-family: sans-serif; }
        canvas { display: block; }
        
        .status-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); color: #fff; display: flex; gap: 30px;
            padding: 10px 40px; border-radius: 30px; font-size: 20px; z-index: 100;
        }

        .panel { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; border: 4px solid #333; padding: 25px; border-radius: 25px; z-index: 2000; width: 280px; text-align: center;
        }
        .input-group { margin: 15px 0; text-align: left; }
        .input-group label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .btn { width: 100%; padding: 15px; background: #ffcc00; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="status-panel">
        <div>💰 <span id="goldText">50</span></div>
        <div>👫 <span id="popText">1</span></div>
        <div>💛 <span id="happyText">1.0</span></div>
    </div>

    <div id="signalPanel" class="panel">
        <h3 style="margin-top:0">🚦 信号設定</h3>
        <p id="levelText">現在のレベル: 1</p>
        
        <div class="input-group">
            <label>青信号の時間: <span id="secDisplay">5</span>秒</label>
            <input type="range" id="secInput" min="2" max="15" value="5" oninput="updateSecText()">
        </div>

        <button id="upgradeBtn" class="btn" onclick="upgradeSignal()">アップグレード (30G)</button>
        <button class="btn" style="background:#eee" onclick="closeAll()">閉じる</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gold = 50, happy = 1.0, pop = 1;
        let signalLevel = 1, signalState = 0, isPaused = false;
        let lastChangeTime = Date.now(), greenTime = 5;

        const images = {};
        const assets = { cars: 'images/car.png', singo: 'singo.png' };
        for (let key in assets) { images[key] = new Image(); images[key].src = assets[key]; }

        const upgradeCosts = [30, 50, 100, 200];
        let cars = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function spawnCar() {
            if (isPaused) return;
            const mx = canvas.width/2, my = canvas.height/2;
            const dirs = ['right', 'down', 'left', 'up'];
            const dir = dirs[Math.floor(Math.random()*4)];
            let x, y;
            if(dir==='right'){ x=-50; y=my+10; } else if(dir==='down'){ x=mx+10; y=-50; }
            else if(dir==='left'){ x=canvas.width+50; y=my-40; } else { x=mx-40; y=canvas.height+50; }
            cars.push({ x, y, speed: 2 + Math.random(), dir, passed: false, id: Math.random(), waitTime: 0 });
        }

        setInterval(() => {
            if (isPaused) return;
            let targetPop = Math.max(1, Math.floor(happy));
            if (pop < targetPop) pop++; else if (pop > targetPop) pop--;
            let targetCarCount = (pop * 0.4 <= 0.9) ? 1 : Math.floor(pop * 0.4);
            if (cars.length < targetCarCount) spawnCar();
            updateUI();
        }, 1000);

        function update() {
            if (!isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const mx = canvas.width/2, my = canvas.height/2;

                // 信号切り替え（設定された秒数で）
                if (Date.now() - lastChangeTime > greenTime * 1000) {
                    signalState = (signalState + 1) % 4;
                    lastChangeTime = Date.now();
                }

                // 道路描画
                ctx.fillStyle = '#444';
                ctx.fillRect(0, my-50, canvas.width, 100);
                ctx.fillRect(mx-50, 0, 100, canvas.height);

                // 信号描画（スプライトシート）
                if (images.singo.complete) {
                    const sw = images.singo.width / 4;
                    const sh = images.singo.height / 2;
                    const col = (signalLevel - 1) % 4; // レベルに合わせて列を切り替え

                    const vGo = signalState < 2;
                    // 横用（縦の道を止める）
                    ctx.drawImage(images.singo, col*sw, (vGo?0:sh), sw, sh, mx-85, my-25, 40, 40);
                    // 縦用（横の道を止める）
                    ctx.drawImage(images.singo, col*sw, (vGo?sh:0), sw, sh, mx-25, my-85, 40, 40);
                }

                const vGo = signalState < 2, hGo = signalState >= 2;

                cars.forEach(car => {
                    let canMove = true;
                    const front = cars.find(o => o.id !== car.id && Math.abs(o.x - car.x) < 45 && Math.abs(o.y - car.y) < 45);
                    if(front) canMove = false;

                    const stopLine = 85;
                    if(car.dir==='right' && !hGo && car.x > mx-stopLine && car.x < mx-60) canMove = false;
                    if(car.dir==='down' && !vGo && car.y > my-stopLine && car.y < my-60) canMove = false;
                    if(car.dir==='left' && !hGo && car.x < mx+stopLine && car.x > mx+40) canMove = false;
                    if(car.dir==='up' && !vGo && car.y < my+stopLine && car.y > my+40) canMove = false;

                    if(canMove) {
                        if(car.dir==='right') car.x+=car.speed; else if(car.dir==='down') car.y+=car.speed;
                        else if(car.dir==='left') car.x-=car.speed; else car.y-=car.speed;
                    } else {
                        car.waitTime += 1/60;
                    }

                    ctx.save();
                    ctx.translate(car.x+20, car.y+20);
                    if(car.dir==='right') ctx.rotate(Math.PI/2); else if(car.dir==='down') ctx.rotate(Math.PI); else if(car.dir==='left') ctx.rotate(-Math.PI/2);
                    if(images.cars.complete) ctx.drawImage(images.cars, 0, 0, images.cars.width/5, images.cars.height/2, -20, -20, 40, 40);
                    ctx.restore();

                    if (!car.passed && Math.abs(car.x - mx) < 35 && Math.abs(car.y - my) < 35) {
                        gold += signalLevel;
                        if (car.waitTime <= 1.0) happy += 0.2; else if (car.waitTime >= 3.1) happy -= 0.2;
                        happy = Math.max(0.1, happy);
                        car.passed = true;
                        updateUI();
                    }
                });
                cars = cars.filter(c => (c.x > -100 && c.x < canvas.width+100 && c.y > -100 && c.y < canvas.height+100));
            }
            requestAnimationFrame(update);
        }

        function updateSecText() {
            greenTime = document.getElementById('secInput').value;
            document.getElementById('secDisplay').innerText = greenTime;
        }

        function updateUI() {
            document.getElementById('goldText').innerText = gold;
            document.getElementById('happyText').innerText = happy.toFixed(1);
            document.getElementById('popText').innerText = pop;
            document.getElementById('levelText').innerText = `現在のレベル: ${signalLevel}`;
            
            const cost = upgradeCosts[signalLevel-1];
            const btn = document.getElementById('upgradeBtn');
            if(cost) {
                btn.innerText = `アップグレード (${cost}G)`;
                btn.disabled = gold < cost;
            } else {
                btn.innerText = "Max Level";
                btn.disabled = true;
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const mx = e.clientX, my = e.clientY;
            const cx = canvas.width/2, cy = canvas.height/2;
            if (Math.abs(mx-cx)<100 && Math.abs(my-cy)<100) { 
                document.getElementById('signalPanel').style.display='block'; 
                isPaused = true;
                updateUI();
            }
        });

        function upgradeSignal() {
            const cost = upgradeCosts[signalLevel-1];
            if(cost && gold >= cost) {
                gold -= cost;
                signalLevel++;
                updateUI();
            }
        }

        function closeAll() { document.getElementById('signalPanel').style.display='none'; isPaused = false; }
        
        update();
    </script>
</body>
</html>
