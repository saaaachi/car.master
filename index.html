<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - High Flow</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #7ab36a; font-family: sans-serif; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; padding-top: 50px; }
        canvas { display: block; }
        .status-bar { 
            position: absolute; top: 60px; left: 10px; right: 10px; 
            display: flex; justify-content: space-around; 
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border-radius: 20px; font-size: 14px; z-index: 100;
        }
        .panel { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; border: 4px solid #333; padding: 20px; border-radius: 20px; z-index: 2000; width: 250px; text-align: center;
        }
        .btn { width: 100%; padding: 12px; background: #ffcc00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #adFrame { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="status-bar">
            <div>💰 <span id="goldText">0</span></div>
            <div>👥 <span id="popText">0</span></div>
            <div>😊 <span id="happyText">100</span></div>
        </div>

        <div id="signalPanel" class="panel">
            <h3>🚥 信号機アップグレード</h3>
            <p>現在のLv: <span id="sigLvText">1</span></p>
            <button class="btn" onclick="upgradeSignal()">強化する (100G)</button>
            <button class="btn" style="background:#ccc" onclick="closeAll()">閉じる</button>
        </div>

        <div id="adFrame">
            <h2>🚨 緊急車両に協力しました！</h2>
            <button class="btn" onclick="closeAd()">10G獲得して閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gold = 50, signalLevel = 1, signalState = 0, isPaused = false;
        let lastChangeTime = Date.now(), autoChangeTime = 5;

        // 画像素材の読み込み
        const images = {};
        const assets = { 
            cars: 'images/car.png', 
            house: 'images/house.png', 
            tatemono: 'images/tatemono.png',
            singo: 'images/singo.png' // 新しい信号機
        };
        for (let key in assets) { images[key] = new Image(); images[key].src = assets[key]; }

        let slots = [];
        function initSlots() {
            const mx = canvas.width/2, my = canvas.height/2;
            slots = [
                { x: mx-155, y: my-155, type: 'house', lv: 1 },
                { x: mx+65,  y: my+65,  type: 'shop',  lv: 1 }
            ];
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initSlots();
        }
        window.addEventListener('resize', resize); resize();

        let cars = [];

        function spawnCar() {
            if (isPaused) return;
            const dirs = ['right', 'down', 'left', 'up'];
            const dir = dirs[Math.floor(Math.random()*4)];
            const mx = canvas.width/2, my = canvas.height/2;
            let x, y;
            if(dir==='right'){ x=-50; y=my+5; } else if(dir==='down'){ x=mx+5; y=-50; }
            else if(dir==='left'){ x=canvas.width+50; y=my-45; } else { x=mx-45; y=canvas.height+50; }
            
            const isEm = Math.random() < 0.2;
            cars.push({ x, y, speed: isEm?5:3, dir, isEmergency: isEm, passed: false, id: Math.random() });
        }
        setInterval(spawnCar, 1500);

        function update() {
            if (!isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const mx = canvas.width/2, my = canvas.height/2;

                // 信号切り替え
                if (Date.now() - lastChangeTime > autoChangeTime * 1000) {
                    signalState = (signalState + 1) % 4;
                    lastChangeTime = Date.now();
                }

                // 道の描画
                ctx.fillStyle = '#444';
                ctx.fillRect(0, my-50, canvas.width, 100);
                ctx.fillRect(mx-50, 0, 100, canvas.height);

                // 信号機の描画 (singo.pngを信号状態に合わせて切り出し)
                if(images.singo.complete) {
                    // 信号の状態に合わせて描画（例：青、黄色、赤の切り替えロジックを想定）
                    const sSize = images.singo.width / 2;
                    ctx.drawImage(images.singo, (signalState%2)*sSize, 0, sSize, images.singo.height, mx-25, my-25, 50, 50);
                }

                let hRed = signalState >= 2, vRed = signalState <= 1;

                cars.forEach(car => {
                    let canMove = true;

                    // 渋滞緩和：前の車との距離判定を大幅に縮小
                    const front = cars.find(o => o.id !== car.id && Math.abs(o.x - car.x) < 40 && Math.abs(o.y - car.y) < 40);
                    if(front && ((car.dir==='right' && front.x > car.x) || (car.dir==='down' && front.y > car.y))) canMove = false;

                    // 信号判定
                    if (!car.isEmergency) {
                        const atStop = (car.dir==='right'&&hRed&&car.x>mx-80&&car.x<mx-60) || (car.dir==='down'&&vRed&&car.y>my-80&&car.y<my-60);
                        if(atStop) canMove = false;
                    }

                    if(canMove) {
                        if(car.dir==='right') car.x+=car.speed; else if(car.dir==='down') car.y+=car.speed;
                        else if(car.dir==='left') car.x-=car.speed; else car.y-=car.speed;
                    }

                    // 車の描画（斜め排除：スプライトシートの左上だけを回転させて使用）
                    ctx.save();
                    ctx.translate(car.x+20, car.y+20);
                    if(car.dir==='right') ctx.rotate(Math.PI/2); else if(car.dir==='down') ctx.rotate(Math.PI); else if(car.dir==='left') ctx.rotate(-Math.PI/2);
                    
                    if(images.cars.complete) {
                        const sw = images.cars.width / 5; // 5列と想定
                        const sh = images.cars.height / 2; // 2行と想定
                        // (0, 0)の位置にある赤い車だけを切り出し
                        ctx.drawImage(images.cars, 0, 0, sw, sh, -20, -20, 40, 40);
                    }
                    ctx.restore();

                    // 収益：交差点の中心を通過した瞬間に発生
                    if (!car.passed && Math.abs(car.x - mx) < 30 && Math.abs(car.y - my) < 30) {
                        gold += signalLevel;
                        car.passed = true;
                        document.getElementById('goldText').innerText = gold;
                    }
                });

                // 画面外に出た車を削除
                cars = cars.filter(c => c.x > -100 && c.x < canvas.width+100 && c.y > -100 && c.y < canvas.height+100);
            }
            requestAnimationFrame(update);
        }

        // クリックイベント等
        canvas.addEventListener('mousedown', (e) => {
            const mx = e.clientX, my = e.clientY;
            const cx = canvas.width/2, cy = canvas.height/2;
            if (Math.abs(mx-cx)<50 && Math.abs(my-cy)<50) { 
                document.getElementById('signalPanel').style.display='block'; 
                isPaused=true; 
            }
        });

        function closeAll() { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); isPaused=false; }
        function upgradeSignal() { if(gold>=100){ gold-=100; signalLevel++; closeAll(); }}
        
        update();
    </script>
</body>
</html>
