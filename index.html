<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - Evolution</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #7ab36a; font-family: sans-serif; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; padding-top: 50px; }
        canvas { display: block; }
        .status-bar { 
            position: absolute; top: 60px; left: 10px; right: 10px; 
            display: flex; justify-content: space-around; 
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border-radius: 20px; font-size: 14px; z-index: 100;
        }
        .panel { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; border: 4px solid #333; padding: 20px; border-radius: 20px; z-index: 2000; width: 250px; text-align: center;
        }
        .btn { width: 100%; padding: 15px; background: #ffcc00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #adFrame { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div style="width:100%; height:50px; background:#eee; text-align:center; position:fixed; top:0; z-index:1000;">
        <p style="margin:0; font-size:10px; color:#999;">AD SPACE</p>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="status-bar">
            <div>💰 <span id="goldText">50</span></div>
            <div>🚥 Lv.<span id="sigLvText">1</span></div>
            <div>💎 +<span id="incomeText">1</span>G</div>
        </div>

        <div id="signalPanel" class="panel">
            <h3 style="margin-top:0">🚥 信号機の進化</h3>
            <p id="nextUpgradeText">次へ: 30G</p>
            <button id="upgradeBtn" class="btn" onclick="upgradeSignal()">アップグレード</button>
            <button class="btn" style="background:#eee" onclick="closeAll()">閉じる</button>
        </div>

        <div id="adFrame">
            <h2>🚨 緊急車両に協力しました！</h2>
            <button class="btn" onclick="closeAd()">10G獲得して閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gold = 50, signalLevel = 1, signalState = 0, isPaused = false;
        let lastChangeTime = Date.now(), autoChangeTime = 5;

        const images = {};
        const assets = { cars: 'images/car.png', house: 'images/house.png', tatemono: 'images/tatemono.png', singo: 'images/singo.png' };
        for (let key in assets) { images[key] = new Image(); images[key].src = assets[key]; }

        const upgradeInfo = [
            { cost: 0, income: 1, next: 30 },
            { cost: 30, income: 2, next: 50 },
            { cost: 50, income: 3, next: 100 },
            { cost: 100, income: 4, next: null }
        ];

        let cars = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function updateUI() {
            document.getElementById('goldText').innerText = gold;
            document.getElementById('sigLvText').innerText = signalLevel;
            const info = upgradeInfo[signalLevel - 1];
            document.getElementById('incomeText').innerText = info.income;
            
            const btn = document.getElementById('upgradeBtn');
            const nextText = document.getElementById('nextUpgradeText');
            if (info.next) {
                nextText.innerText = `次へ: ${info.next}G (収益+1)`;
                btn.disabled = gold < info.next;
            } else {
                nextText.innerText = "最高レベルです！";
                btn.style.display = 'none';
            }
        }

        function spawnCar() {
            if (isPaused) return;
            const dirs = ['right', 'down', 'left', 'up'];
            const dir = dirs[Math.floor(Math.random()*4)];
            const mx = canvas.width/2, my = canvas.height/2;
            let x, y;
            if(dir==='right'){ x=-50; y=my+5; } else if(dir==='down'){ x=mx+5; y=-50; }
            else if(dir==='left'){ x=canvas.width+50; y=my-45; } else { x=mx-45; y=canvas.height+50; }
            
            const isEm = Math.random() < 0.15;
            cars.push({ x, y, speed: isEm?5:3, dir, isEmergency: isEm, passed: false, id: Math.random() });
        }
        setInterval(spawnCar, 1500);

        function update() {
            if (!isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const mx = canvas.width/2, my = canvas.height/2;

                if (Date.now() - lastChangeTime > autoChangeTime * 1000) {
                    signalState = (signalState + 1) % 4;
                    lastChangeTime = Date.now();
                }

                ctx.fillStyle = '#444'; ctx.fillRect(0, my-50, canvas.width, 100); ctx.fillRect(mx-50, 0, 100, canvas.height);

                // 信号の描画
                if(images.singo.complete) {
                    const sw = images.singo.width / 4;
                    const sh = images.singo.height / 2;
                    // signalState 0,1 は青信号行(下)、2,3 は赤信号行(上)
                    const row = (signalState >= 2) ? 0 : 1; 
                    const col = signalLevel - 1; // 1〜4で色が変わる
                    ctx.drawImage(images.singo, col * sw, row * sh, sw, sh, mx-25, my-25, 50, 50);
                }

                let hRed = signalState >= 2, vRed = signalState <= 1;

                cars.forEach(car => {
                    let canMove = true;
                    // 渋滞判定をさらに最適化
                    const front = cars.find(o => o.id !== car.id && Math.abs(o.x - car.x) < 35 && Math.abs(o.y - car.y) < 35);
                    if(front) {
                        if(car.dir==='right' && front.x > car.x) canMove = false;
                        if(car.dir==='down' && front.y > car.y) canMove = false;
                        if(car.dir==='left' && front.x < car.x) canMove = false;
                        if(car.dir==='up' && front.y < car.y) canMove = false;
                    }

                    if (!car.isEmergency) {
                        const stopZone = 75;
                        if(car.dir==='right'&&hRed&&car.x>mx-stopZone&&car.x<mx-60) canMove = false;
                        if(car.dir==='down'&&vRed&&car.y>my-stopZone&&car.y<my-60) canMove = false;
                        if(car.dir==='left'&&hRed&&car.x<mx+stopZone&&car.x>mx+40) canMove = false;
                        if(car.dir==='up'&&vRed&&car.y<my+stopZone&&car.y>my+40) canMove = false;
                    }

                    if(canMove) {
                        if(car.dir==='right') car.x+=car.speed; else if(car.dir==='down') car.y+=car.speed;
                        else if(car.dir==='left') car.x-=car.speed; else car.y-=car.speed;
                    }

                    ctx.save();
                    ctx.translate(car.x+20, car.y+20);
                    if(car.dir==='right') ctx.rotate(Math.PI/2); else if(car.dir==='down') ctx.rotate(Math.PI); else if(car.dir==='left') ctx.rotate(-Math.PI/2);
                    if(images.cars.complete) {
                        // スプライトシートの左上(赤い車)だけを使用
                        ctx.drawImage(images.cars, 0, 0, images.cars.width/5, images.cars.height/2, -20, -20, 40, 40);
                    }
                    ctx.restore();

                    // 収益判定（交差点進入時）
                    if (!car.passed && Math.abs(car.x - mx) < 40 && Math.abs(car.y - my) < 40) {
                        gold += upgradeInfo[signalLevel-1].income;
                        car.passed = true;
                        updateUI();
                    }
                });
                cars = cars.filter(c => c.x > -100 && c.x < canvas.width+100 && c.y > -100 && c.y < canvas.height+100);
            }
            requestAnimationFrame(update);
        }

        canvas.addEventListener('mousedown', (e) => {
            const mx = e.clientX, my = e.clientY;
            const cx = canvas.width/2, cy = canvas.height/2;
            if (Math.abs(mx-cx)<50 && Math.abs(my-cy)<50) { 
                document.getElementById('signalPanel').style.display='block'; 
                isPaused=true;
                updateUI();
            }
        });

        function upgradeSignal() {
            const nextCost = upgradeInfo[signalLevel-1].next;
            if(nextCost && gold >= nextCost) {
                gold -= nextCost;
                signalLevel++;
                updateUI();
                closeAll();
            }
        }

        function closeAll() { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); isPaused=false; }
        
        updateUI();
        update();
    </script>
</body>
</html>
