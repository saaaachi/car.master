<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - High Reliability</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #7ab36a; font-family: sans-serif; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; }
        #adArea { width: 100%; height: 50px; background: #eee; position: absolute; top: 0; z-index: 1000; }
        canvas { display: block; background: #7ab36a; }

        .status-panel { 
            position: absolute; top: 60px; left: 15px; 
            background: rgba(0, 0, 0, 0.75); color: #fff; 
            padding: 12px 18px; border-radius: 20px; 
            font-size: 18px; z-index: 100;
        }
        .status-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

        .panel { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; border: 4px solid #333; padding: 20px; border-radius: 25px; z-index: 2000; width: 240px; text-align: center;
        }
        .btn { width: 100%; padding: 15px; background: #ffcc00; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="adArea">
        <iframe src="up.ad.html" width="100%" height="50" frameborder="0" scrolling="no"></iframe>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="status-panel">
            <div class="status-item">💰 <span id="goldText">50</span></div>
            <div class="status-item">💛 <span id="happyText">1.0</span></div>
            <div class="status-item">👫 <span id="popText">1</span></div>
        </div>

        <div id="signalPanel" class="panel">
            <h3 style="margin-top:0">🚥 信号強化</h3>
            <p id="nextUpgradeText">次へ: 30G</p>
            <button id="upgradeBtn" class="btn" onclick="upgradeSignal()">アップグレード</button>
            <button class="btn" style="background:#eee" onclick="closeAll()">閉じる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gold = 50, happy = 1.0, pop = 1;
        let signalLevel = 1, signalState = 0, isPaused = false;
        let lastChangeTime = Date.now(), autoChangeTime = 5;

        const images = {};
        const assets = { cars: 'images/car.png', singo: 'singo.png' };
        for (let key in assets) { 
            images[key] = new Image(); 
            images[key].src = assets[key];
            images[key].onerror = () => { console.log(key + " の読み込みに失敗しました。図形で代用します。"); };
        }

        const upgradeInfo = [{income:1,next:30},{income:2,next:50},{income:3,next:100},{income:4,next:null}];
        let cars = [];

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize); resize();

        function spawnCar() {
            const mx = canvas.width/2, my = canvas.height/2;
            const dirs = ['right', 'down', 'left', 'up'];
            const dir = dirs[Math.floor(Math.random()*4)];
            let x, y;

            if(dir==='right'){ x=-50; y=my+10; } 
            else if(dir==='down'){ x=mx+10; y=-50; }
            else if(dir==='left'){ x=canvas.width+50; y=my-40; } 
            else { x=mx-40; y=canvas.height+50; }

            cars.push({ x, y, speed: 2 + Math.random(), dir, passed: false, id: Math.random(), waitTime: 0 });
        }

        // 監視と補充
        setInterval(() => {
            if (isPaused) return;
            let targetPop = Math.max(1, Math.floor(happy));
            if (pop < targetPop) pop++; else if (pop > targetPop) pop--;

            // 人口×0.4、最低1台のルール
            let targetCarCount = (pop * 0.4 <= 0.9) ? 1 : Math.floor(pop * 0.4);
            if (cars.length < targetCarCount) spawnCar();
            updateUI();
        }, 1000);

        function update() {
            if (!isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const mx = canvas.width/2, my = canvas.height/2;

                if (Date.now() - lastChangeTime > autoChangeTime * 1000) {
                    signalState = (signalState + 1) % 4;
                    lastChangeTime = Date.now();
                }

                // 道路
                ctx.fillStyle = '#444';
                ctx.fillRect(0, my-50, canvas.width, 100);
                ctx.fillRect(mx-50, 0, 100, canvas.height);

                // 信号機の描画（画像がない場合は円で表示）
                const vGo = signalState < 2, hGo = signalState >= 2;
                
                // 横用
                drawSignal(mx-85, my-25, hGo);
                // 縦用
                drawSignal(mx-25, my-85, vGo);

                cars.forEach((car) => {
                    let canMove = true;
                    // 車間距離
                    const front = cars.find(o => o.id !== car.id && Math.abs(o.x - car.x) < 50 && Math.abs(o.y - car.y) < 50);
                    if(front) {
                        if(car.dir==='right' && front.x > car.x) canMove = false;
                        if(car.dir==='down' && front.y > car.y) canMove = false;
                        if(car.dir==='left' && front.x < car.x) canMove = false;
                        if(car.dir==='up' && front.y < car.y) canMove = false;
                    }

                    // 信号判定
                    const stopLine = 85;
                    if(car.dir==='right' && !hGo && car.x > mx-stopLine && car.x < mx-60) canMove = false;
                    if(car.dir==='down' && !vGo && car.y > my-stopLine && car.y < my-60) canMove = false;
                    if(car.dir==='left' && !hGo && car.x < mx+stopLine && car.x > mx+40) canMove = false;
                    if(car.dir==='up' && !vGo && car.y < my+stopLine && car.y > my+40) canMove = false;

                    if(canMove) {
                        if(car.dir==='right') car.x+=car.speed; else if(car.dir==='down') car.y+=car.speed;
                        else if(car.dir==='left') car.x-=car.speed; else car.y-=car.speed;
                    } else {
                        car.waitTime += 1/60;
                    }

                    // 車の描画
                    ctx.save();
                    ctx.translate(car.x+20, car.y+20);
                    if(car.dir==='right') ctx.rotate(Math.PI/2); else if(car.dir==='down') ctx.rotate(Math.PI); else if(car.dir==='left') ctx.rotate(-Math.PI/2);
                    
                    if(images.cars.complete && images.cars.naturalWidth !== 0) {
                        ctx.drawImage(images.cars, 0, 0, images.cars.width/5, images.cars.height/2, -20, -20, 40, 40);
                    } else {
                        // 代わりの赤い四角
                        ctx.fillStyle = 'red';
                        ctx.fillRect(-15, -10, 30, 20);
                    }
                    ctx.restore();

                    if (!car.passed && Math.abs(car.x - mx) < 35 && Math.abs(car.y - my) < 35) {
                        gold += upgradeInfo[signalLevel-1].income;
                        if (car.waitTime <= 1.0) happy += 0.2;
                        else if (car.waitTime >= 3.1) happy -= 0.2;
                        happy = Math.max(0.1, happy);
                        car.passed = true;
                        updateUI();
                    }
                });
                cars = cars.filter(c => (c.x > -100 && c.x < canvas.width+100 && c.y > -100 && c.y < canvas.height+100));
            }
            requestAnimationFrame(update);
        }

        function drawSignal(x, y, isGreen) {
            if(images.singo.complete && images.singo.naturalWidth !== 0) {
                const sw = images.singo.width/4, sh = images.singo.height/2;
                ctx.drawImage(images.singo, (signalLevel-1)*sw, (isGreen?sh:0), sw, sh, x, y, 40, 40);
            } else {
                // 画像がない時の代わりの円
                ctx.fillStyle = '#333'; ctx.fillRect(x, y, 40, 20);
                ctx.beginPath(); ctx.arc(x + (isGreen?30:10), y+10, 8, 0, Math.PI*2);
                ctx.fillStyle = isGreen ? '#0f0' : '#f00'; ctx.fill();
            }
        }

        function updateUI() {
            document.getElementById('goldText').innerText = gold;
            document.getElementById('happyText').innerText = happy.toFixed(1);
            document.getElementById('popText').innerText = pop;
        }

        canvas.addEventListener('mousedown', (e) => {
            const mx = e.clientX, my = e.clientY;
            const cx = canvas.width/2, cy = canvas.height/2;
            if (Math.abs(mx-cx)<100 && Math.abs(my-cy)<100) { 
                document.getElementById('signalPanel').style.display='block'; 
                isPaused=true; updateUI();
            }
        });

        function upgradeSignal() {
            const nextCost = upgradeInfo[signalLevel-1].next;
            if(nextCost && gold >= nextCost) { gold -= nextCost; signalLevel++; happy += 0.5; updateUI(); closeAll(); }
        }
        function closeAll() { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); isPaused=false; }
        
        update();
    </script>
</body>
</html>
