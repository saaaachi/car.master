<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - Flow Fix</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #7ab36a; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #adArea { width: 100%; height: 60px; background: #eee; flex-shrink: 0; z-index: 1000; border-bottom: 2px solid #ccc; }
        #gameContainer { position: relative; flex-grow: 1; width: 100%; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; background: #7ab36a; }
        
        .status-panel { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0, 0, 0, 0.6); color: #fff; 
            padding: 6px 12px; border-radius: 12px; font-size: 13px; z-index: 100;
            display: flex; flex-direction: column; gap: 2px; pointer-events: none;
        }

        .panel { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; border: 3px solid #333; padding: 20px; border-radius: 20px; z-index: 2000; width: 240px; text-align: center;
        }
        .btn { width: 100%; padding: 12px; background: #ffcc00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 8px; }

        #adOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 5000; flex-direction: column; align-items: center; justify-content: center;
        }
        #closeAdBtn {
            display: none; margin-top: 15px; padding: 10px 30px; background: #fff; color: #333;
            border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="adArea">
        <iframe src="up.ad.html" width="100%" height="60" frameborder="0" scrolling="no"></iframe>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div class="status-panel">
            <div>💰 <span id="goldText">50</span></div>
            <div>👫 <span id="popText">1</span></div>
            <div>💛 <span id="happyText">1.0</span></div>
        </div>

        <div id="signalPanel" class="panel">
            <h3 style="margin:0 0 10px 0">🚦 信号設定</h3>
            <div style="text-align:left; font-size:12px;">
                <label>青信号: <span id="secDisplay">5</span>秒</label>
                <input type="range" id="secInput" min="2" max="15" value="5" style="width:100%" oninput="updateSecText()">
            </div>
            <button id="upgradeBtn" class="btn" onclick="upgradeSignal()">強化</button>
            <button class="btn" style="background:#eee" onclick="closeAll()">閉じる</button>
        </div>
    </div>

    <div id="adOverlay">
        <iframe src="ad.html" width="300" height="250" frameborder="0" scrolling="no"></iframe>
        <div id="closeAdBtn" onclick="finishRewardAd()">✖ 閉じて 10G ゲット！</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gold = 50, happy = 1.0, pop = 1;
        let signalLevel = 1, signalState = 0, isPaused = false;
        let lastChangeTime = Date.now(), greenTime = 5;

        const images = { cars: new Image(), kinkyu: new Image() };
        images.cars.src = 'images/car.png';
        images.kinkyu.src = 'kinkyu.png';

        const upgradeCosts = [30, 50, 100, 200];
        let cars = [];

        function resize() { 
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth; 
            canvas.height = container.clientHeight; 
        }
        window.addEventListener('resize', resize); resize();

        function spawnCar() {
            const mx = canvas.width/2, my = canvas.height/2;
            const dirs = ['right', 'down', 'left', 'up'];
            const dir = dirs[Math.floor(Math.random()*4)];
            let x, y;
            if(dir==='right'){ x=-60; y=my+10; } 
            else if(dir==='down'){ x=mx+10; y=-60; }
            else if(dir==='left'){ x=canvas.width+60; y=my-40; } 
            else { x=mx-40; y=canvas.height+60; }
            
            // ★ 緊急車両の出現率を少しアップ (20%)
            const isEmergency = Math.random() < 0.20;
            const typeIndex = Math.floor(Math.random() * 3);
            
            cars.push({ 
                x, y, speed: (isEmergency ? 3.5 : 2.5) + Math.random(), 
                dir, passed: false, id: Math.random(), waitTime: 0,
                isEmergency, typeIndex, flash: 0
            });
        }

        // ★ 車両補充の監視を強化
        setInterval(() => {
            if (isPaused) return;
            
            // 人口の計算
            let tp = Math.max(1, Math.floor(happy));
            if (pop < tp) pop++; else if (pop > tp) pop--;
            
            // ★ 最低でも2〜3台は常に走るように調整
            let targetCount = Math.max(2, Math.floor(pop * 0.6));
            
            if (cars.length < targetCount) {
                spawnCar();
            }
            updateUI();
        }, 800); // チェック間隔も少し短くしました

        function update() {
            if (!isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const mx = canvas.width/2, my = canvas.height/2;

                if (Date.now() - lastChangeTime > greenTime * 1000) {
                    signalState = (signalState + 1) % 4;
                    lastChangeTime = Date.now();
                }

                ctx.fillStyle = '#444';
                ctx.fillRect(0, my-50, canvas.width, 100);
                ctx.fillRect(mx-50, 0, 100, canvas.height);

                const vGo = signalState < 2, hGo = signalState >= 2;

                drawCodeSignal(mx-85, my-25, hGo, signalLevel);
                drawCodeSignal(mx-25, my-85, vGo, signalLevel);

                cars.forEach(car => {
                    let canMove = true;
                    const front = cars.find(o => o.id !== car.id && Math.abs(o.x - car.x) < 50 && Math.abs(o.y - car.y) < 50);
                    if(front) {
                        // 進行方向の重なりチェックを厳密化
                        if(car.dir==='right' && front.x > car.x) canMove = false;
                        if(car.dir==='down' && front.y > car.y) canMove = false;
                        if(car.dir==='left' && front.x < car.x) canMove = false;
                        if(car.dir==='up' && front.y < car.y) canMove = false;
                    }

                    const stopLine = 85;
                    if(car.dir==='right' && !hGo && car.x > mx-stopLine && car.x < mx-60) canMove = false;
                    if(car.dir==='down' && !vGo && car.y > my-stopLine && car.y < my-60) canMove = false;
                    if(car.dir==='left' && !hGo && car.x < mx+stopLine && car.x > mx+40) canMove = false;
                    if(car.dir==='up' && !vGo && car.y < my+stopLine && car.y > my+40) canMove = false;

                    if(canMove) {
                        if(car.dir==='right') car.x+=car.speed; else if(car.dir==='down') car.y+=car.speed;
                        else if(car.dir==='left') car.x-=car.speed; else car.y-=car.speed;
                    } else { car.waitTime += 1/60; }

                    ctx.save();
                    ctx.translate(car.x+20, car.y+20);
                    if(car.dir==='right') ctx.rotate(Math.PI/2); else if(car.dir==='down') ctx.rotate(Math.PI); else if(car.dir==='left') ctx.rotate(-Math.PI/2);
                    
                    if(car.isEmergency && images.kinkyu.complete) {
                        car.flash = (Math.floor(Date.now()/120) % 2); // 点滅を少し速く
                        ctx.drawImage(images.kinkyu, car.typeIndex*32, car.flash*32, 32, 32, -20, -20, 40, 40);
                    } else if(images.cars.complete) {
                        ctx.drawImage(images.cars, 0, 0, images.cars.width/5, images.cars.height/2, -20, -20, 40, 40);
                    } else {
                        ctx.fillStyle = car.isEmergency ? '#f0f' : '#f33';
                        ctx.fillRect(-15, -10, 30, 20);
                    }
                    ctx.restore();

                    if (!car.passed) {
                        let isCrossing = false;
                        if(car.dir==='right' && car.x > mx) isCrossing = true;
                        if(car.dir==='down' && car.y > my) isCrossing = true;
                        if(car.dir==='left' && car.x < mx) isCrossing = true;
                        if(car.dir==='up' && car.y < my) isCrossing = true;

                        if(isCrossing) {
                            gold += signalLevel; 
                            if (car.waitTime <= 1.0) happy += 0.2; 
                            else if (car.waitTime >= 3.1) happy -= 0.2;
                            happy = Math.max(0.1, happy); 
                            car.passed = true;
                            updateUI();
                        }
                    }
                });
                cars = cars.filter(c => (c.x > -200 && c.x < canvas.width+200 && c.y > -200 && c.y < canvas.height+200));
            }
            requestAnimationFrame(update);
        }

        function drawCodeSignal(x, y, isGreen, level) {
            const baseColors = ['#555', '#e44', '#ee4', '#4ae'];
            const baseColor = baseColors[(level - 1) % baseColors.length];
            ctx.fillStyle = baseColor;
            ctx.fillRect(x, y, 30, 40);
            ctx.fillStyle = isGreen ? '#0f0' : '#f00';
            ctx.beginPath();
            ctx.arc(x + 15, y + (isGreen ? 30 : 10), 8, 0, Math.PI * 2);
            ctx.fill();
        }

        function updateUI() {
            document.getElementById('goldText').innerText = gold;
            document.getElementById('happyText').innerText = happy.toFixed(1);
            document.getElementById('popText').innerText = pop;
            const btn = document.getElementById('upgradeBtn');
            const cost = upgradeCosts[signalLevel-1];
            if(cost) { btn.innerText = `強化 (${cost}G)`; btn.disabled = gold < cost; }
            else { btn.innerText = "Max Level"; btn.disabled = true; }
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            const hitCar = cars.find(c => c.isEmergency && Math.abs(c.x+20 - mx) < 40 && Math.abs(c.y+20 - my) < 40);
            if(hitCar) {
                showRewardAd();
                return;
            }

            const cx = canvas.width/2, cy = canvas.height/2;
            if (Math.abs(mx-cx)<100 && Math.abs(my-cy)<100) { 
                document.getElementById('signalPanel').style.display='block'; 
                isPaused = true; updateUI();
            }
        });

        function showRewardAd() {
            isPaused = true;
            document.getElementById('adOverlay').style.display = 'flex';
            document.getElementById('closeAdBtn').style.display = 'none';
            setTimeout(() => { document.getElementById('closeAdBtn').style.display = 'block'; }, 5000);
        }

        function finishRewardAd() {
            gold += 10;
            document.getElementById('adOverlay').style.display = 'none';
            isPaused = false;
            updateUI();
        }

        function upgradeSignal() {
            const cost = upgradeCosts[signalLevel-1];
            if(cost && gold >= cost) { gold -= cost; signalLevel++; updateUI(); }
        }
        function closeAll() { document.getElementById('signalPanel').style.display='none'; isPaused = false; }
        function updateSecText() { greenTime = document.getElementById('secInput').value; document.getElementById('secDisplay').innerText = greenTime; }
        
        update();
    </script>
</body>
</html>
